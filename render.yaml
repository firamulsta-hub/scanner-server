services:
  - type: web
    name: scanner-server-1
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000

  - type: cron
    name: scanner-server
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python jobs/run_scanners.py
    schedule: "*/10 * * * *"
